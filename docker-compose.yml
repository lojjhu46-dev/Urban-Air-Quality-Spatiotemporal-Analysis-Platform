services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: beijing-aq-dashboard:latest
    container_name: beijing-aq-dashboard
    ports:
      - "8501:8501"
    environment:
      PORT: "8501"
      STREAMLIT_SERVER_HEADLESS: "true"
      STREAMLIT_SERVER_ADDRESS: "0.0.0.0"
      STREAMLIT_SERVER_PORT: "8501"
    volumes:
      - ./data/processed:/app/data/processed
      - ./data/raw:/app/data/raw:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8501/_stcore/health', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped
