name: Streamlit Cloud Check

on:
  push:
    branches:
      - main
      - master
  pull_request:

concurrency:
  group: streamlit-cloud-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (Syntax)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Syntax lint
        run: |
          python -m py_compile \
            app.py \
            scripts/*.py \
            src/*.py \
            pages/*.py \
            tests/*.py

  test:
    name: Test (Pytest)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run tests
        run: |
          pytest -q
